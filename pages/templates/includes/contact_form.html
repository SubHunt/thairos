<!-- Форма "Написать нам" с модальным окном -->
<section id="contact-form" class="py-20 bg-white">
    <div class="container mx-auto px-4">
        <h2 class="text-4xl font-bold text-center text-primary mb-12">Написать нам</h2>
        <form id="price-request-form" class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label for="name" class="block text-gray-700 font-medium mb-2">Ваше имя *</label>
                    <input type="text" id="name" name="name" required placeholder="Введите ваше имя"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent">
                </div>
                <div>
                    <label for="company" class="block text-gray-700 font-medium mb-2">Компания</label>
                    <input type="text" id="company" name="company" placeholder="Название организации"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent">
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label for="phone" class="block text-gray-700 font-medium mb-2">Телефон *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="7+(***)***-**-**"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent">
                </div>
                <div>
                    <label for="email" class="block text-gray-700 font-medium mb-2">E-mail *</label>
                    <input type="email" id="email" name="email" required placeholder="email@example.ru"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent">
                </div>
            </div>
            <div class="mb-6">
                <label for="message" class="block text-gray-700 font-medium mb-2">Ваше сообщение</label>
                <textarea id="message" name="message" rows="4" placeholder="Ваше сообщение"
                          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent"></textarea>
            </div>
            <button type="submit"
                    class="w-full bg-secondary text-white font-bold py-4 px-8 rounded-lg hover:bg-opacity-90 transition duration-300">
                Отправить заявку
            </button>
        </form>
    </div>
</section>

<!-- Success Modal -->
<div id="success-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 max-w-md mx-4 shadow-2xl">
        <div class="text-center">
            <div class="text-green-500 text-6xl mb-4">✓</div>
            <h3 class="text-2xl font-bold text-gray-800 mb-4">Спасибо за ваше обращение</h3>
            <p class="text-gray-600 mb-6">Ваше сообщение отправлено, мы с вами свяжемся в ближайшее время.</p>
            <button id="close-modal"
                    class="bg-secondary text-white font-bold py-2 px-6 rounded-lg hover:bg-opacity-90 transition">
                Закрыть
            </button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('price-request-form');
        const modal = document.getElementById('success-modal');
        const closeBtn = document.getElementById('close-modal');

        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                // Здесь можно добавить отправку данных на сервер (AJAX)
                // Пока просто показываем модальное окно
                modal.classList.remove('hidden');
                // Автоматическое скрытие через 5 секунд
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 5000);
            });
        }

        if (closeBtn) {
            closeBtn.addEventListener('click', function() {
                modal.classList.add('hidden');
            });
        }

        // Закрытие по клику вне модального окна
        modal.addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        });
    });
</script>
